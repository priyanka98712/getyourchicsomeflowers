<!DOCTYPE html>
<html>

<head>
    <title>Get Your Chic Some Flowers</title>
</head>

<body>

    <h1 style="text-align:center;color:#ff4d88;">
        💐 Get Your Chic Some Flowers 💘
    </h1>

    <h3 style="text-align:center;color:#777;">
        Never show up to a date empty-handed
    </h3>

    <form method="POST" style="text-align:center;margin-top:30px;">

        <h3>Your name</h3>
        <input type="text" name="name" required>
        <br><br>

        <h3>Choose flowers for your chic 🌸</h3>

        Rose 🌹 :
        <input type="number" name="rose" min="0" max="10" value="0">
        <br><br>

        Tulip 🌷 :
        <input type="number" name="tulip" min="0" max="10" value="0">
        <br><br>

        Lily 🌼 :
        <input type="number" name="lily" min="0" max="10" value="0">
        <br><br>

        Sunflower 🌻 :
        <input type="number" name="sunflower" min="0" max="10" value="0">
        <br><br>

        <button type="submit">Create Bouquet 💐</button>

    </form>

</body>

</html>
